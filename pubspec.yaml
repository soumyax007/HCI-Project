name: medhelp_flutter
description: MedHelp — prescription scanning & medicine reminders for elderly patients.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.1.2
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  http_parser: ^4.0.2
  supabase_flutter: ^2.3.4
  shared_preferences: ^2.2.3
  url_launcher: ^6.2.6
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  audioplayers: ^6.0.0
  flutter_dotenv: ^5.1.0
  google_sign_in: ^6.2.1
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/notification.wav
    - assets/SVG/
    - .env